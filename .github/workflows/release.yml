

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production-release

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node for npm
        uses: actions/setup-node@v6
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
          scope: '@spokane-folio'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate module descriptor
        run: yarn run build-mod-descriptor

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Pack tarball
        run: yarn pack

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run:
          gh release create v${{ steps.pkg.outputs.version }}"" \
          module-descriptor.json \
          *.tgz \
          --title "security-incident v${{ steps.pkg.outputs.version }}"
